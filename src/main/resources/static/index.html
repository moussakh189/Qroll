<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRoll — Mark Attendance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .logo span { color: #4361ee; }

.subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        input[type="text"]:focus {
            border-color: #4361ee;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #3451d1; }
        button:active { transform: scale(0.98); }

        .result {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .result.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .result.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .token-info {
            margin-top: 16px;
            font-size: 11px;
            color: #bbb;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">QR<span>oll</span></div>
    <div class="subtitle">Mark your attendance</div>

    <form id="scanForm">
        <label for="studentId">Student ID</label>
        <input type="text" id="studentId" name="studentId"
               placeholder="e.g. STU001" required autocomplete="off"
               autocapitalize="characters">

        <!-- Hidden fields — filled by JavaScript from URL query params -->
        <input type="hidden" id="tokenField"   name="token">
        <input type="hidden" id="sessionField" name="session">

        <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div class="result" id="result"></div>
    <div class="token-info" id="tokenInfo"></div>
</div>

<script>
    // Extract token and session from URL query parameters

    const params = new URLSearchParams(window.location.search);
    const token   = params.get('token');
    const session = params.get('session');

    document.getElementById('tokenField').value   = token   || '';
    document.getElementById('sessionField').value = session || '';

    if (token) {
        document.getElementById('tokenInfo').textContent =
            'Token: ' + token.substring(0, 3) + '***';
    } else {
        document.getElementById('tokenInfo').textContent =
            'No token found — scan the QR code again';
    }

    // Handle form submission via fetch (no page reload)
    document.getElementById('scanForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn    = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const studentId = document.getElementById('studentId').value.trim();

        if (!studentId) return;

        btn.textContent = 'Submitting...';
        btn.disabled    = true;
        result.style.display = 'none';

        try {
            // Send as form data (application/x-www-form-urlencoded)
            const body = new URLSearchParams({
                studentId: studentId,
                token:     token   || '',
                session:   session || ''
            });

            const response = await fetch('/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body.toString()
            });

            const data = await response.json();

            result.style.display = 'block';
            if (response.ok) {
                result.className = 'result success';
                result.textContent = 'Present! thank you for you Attention  ' + data.name;
                btn.textContent    = 'Attendance Marked';
            } else {
                result.className = 'result error';
                result.textContent = data.message || 'Something went wrong';
                btn.textContent    = 'Submit';
                btn.disabled       = false;
            }
        } catch (err) {
            result.style.display = 'block';
            result.className     = 'result error';
            result.textContent   = 'Connection error. Are you on the classroom WiFi?';
            btn.textContent      = 'Submit';
            btn.disabled         = false;
        }
    });
</script>
</body>
</html>
